name: Android CI Auto Release

on:
  push:
    tags:
      - 'v*' # Triggers on semantic version tag pushes (e.g., v1.0.0, v2.1.0)
  workflow_dispatch: # Allows manual trigger of the release workflow from GitHub UI

jobs:
  release:
    name: Build & Create Release Assets
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial permission for creating releases and uploading draft assets

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK and App Bundle (AAB)
      run: ./gradlew assembleRelease bundleRelease

    # Interactive Step: Sign the resulting APK (Optional but recommended)
    # To use this, add the following Secrets inside your Github Repository Settings:
    # 1. SIGNING_KEY: Base64 string of your keystore file.
    # 2. ALIAS: Your key alias.
    # 3. KEY_STORE_PASSWORD: Keystore password.
    # 4. KEY_PASSWORD: Private key password.
    - name: Sign Android Release Artifacts
      id: sign_app
      uses: r0adkll/sign-android-release@v1
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}
      continue-on-error: true # Gracefully falls back to unsigned status if secrets are empty

    # Prepares release packaging destination path
    - name: Organize Production Files
      id: organize_files
      run: |
        mkdir -p release-artifacts
        
        # Check if signing has generated a signed APK
        if [ "${{ steps.sign_app.outputs.signedReleaseFile }}" != "" ] && [ -f "${{ steps.sign_app.outputs.signedReleaseFile }}" ]; then
          echo "Found signed APK: ${{ steps.sign_app.outputs.signedReleaseFile }}"
          cp "${{ steps.sign_app.outputs.signedReleaseFile }}" release-artifacts/bro-musik-eq-${{ github.ref_name }}-signed.apk
        else
          echo "No signed APK found. Packing unsigned release APK as placeholder."
          # If assembleRelease was run, the file is usually at app-release-unsigned.apk
          if [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            cp "app/build/outputs/apk/release/app-release-unsigned.apk" release-artifacts/bro-musik-eq-${{ github.ref_name }}-unsigned.apk
          elif [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            cp "app/build/outputs/apk/release/app-release.apk" release-artifacts/bro-musik-eq-${{ github.ref_name }}-unsigned.apk
          fi
        fi

        # Add Google Play store App Bundle (AAB) to releases if successfully generated
        if [ -f "app/build/outputs/bundle/release/app-release.aab" ]; then
          cp "app/build/outputs/bundle/release/app-release.aab" release-artifacts/bro-musik-eq-${{ github.ref_name }}.aab
        fi

    - name: Create Production GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          release-artifacts/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
